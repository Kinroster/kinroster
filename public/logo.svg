<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="currentColor" opacity="0.1"/>
  <!-- Stethoscope-inspired shape: circle + tube forming a mic/note hybrid -->
  <circle cx="20" cy="14" r="6" stroke="currentColor" stroke-width="2.2" fill="none"/>
  <!-- Heartbeat/pulse line through the circle -->
  <polyline points="14,14 17,14 18.5,10 20,18 21.5,12 23,14 26,14" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stethoscope tube going down -->
  <path d="M14 14 C14 14, 12 16, 12 20 C12 24, 16 27, 20 27" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M26 14 C26 14, 28 16, 28 20 C28 24, 24 27, 20 27" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Mic dot at bottom (represents voice) -->
  <circle cx="20" cy="27" r="2.5" fill="currentColor"/>
  <!-- Small sound waves from mic -->
  <path d="M15 30 C15 30, 17.5 33, 20 33 C22.5 33, 25 30, 25 30" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
